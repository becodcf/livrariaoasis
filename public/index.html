<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livraria Oasis - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="text-center mb-4 text-primary">Livraria Oasis</h1>
        <p class="text-center text-muted">Painel de Gerenciamento - Alta Disponibilidade AWS</p>

        <div class="row">
            <div class="col-md-5 mb-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h4 class="card-title mb-3">Cadastrar Novo Livro</h4>
                        <form id="formLivro">
                            <div class="mb-3">
                                <label for="titulo" class="form-label">Título do Livro</label>
                                <input type="text" class="form-control" id="titulo" required>
                            </div>
                            <div class="mb-3">
                                <label for="autor" class="form-label">Autor</label>
                                <input type="text" class="form-control" id="autor" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Cadastrar no Banco de Dados</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-7">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h4 class="card-title mb-3">Estoque Atual (RDS)</h4>
                        <table class="table table-striped table-hover">
                            <thead class="table-dark">
                                <tr>
                                    <th>ID</th>
                                    <th>Título</th>
                                    <th>Autor</th>
                                </tr>
                            </thead>
                            <tbody id="tabelaLivros">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Função para buscar e exibir os livros (Consulta)
        async function carregarLivros() {
            try {
                const response = await fetch('/livros');
                const livros = await response.json();
                
                const tbody = document.getElementById('tabelaLivros');
                tbody.innerHTML = ''; // Limpa a tabela antes de preencher

                livros.forEach(livro => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${livro.id}</td>
                        <td>${livro.titulo}</td>
                        <td>${livro.autor}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                console.error('Erro ao carregar livros:', error);
            }
        }

        // Função para cadastrar livro (Gravação)
        document.getElementById('formLivro').addEventListener('submit', async (e) => {
            e.preventDefault(); // Evita recarregar a página
            
            const titulo = document.getElementById('titulo').value;
            const autor = document.getElementById('autor').value;

            try {
                await fetch('/livros', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ titulo, autor })
                });

                // Limpa o formulário e recarrega a tabela
                document.getElementById('formLivro').reset();
                carregarLivros();
                alert('Livro cadastrado com sucesso na Livraria Oasis!');
            } catch (error) {
                console.error('Erro ao cadastrar:', error);
                alert('Erro ao cadastrar livro.');
            }
        });

        // Carrega os livros assim que a página abre
        carregarLivros();
    </script>
</body>
</html>
